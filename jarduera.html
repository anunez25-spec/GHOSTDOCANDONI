<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Jarduera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .item {
            color: white;
            text-align: center;
            font-weight: bold;
            padding: 20px;
        }

        .a { background-color: red; }
        .b { background-color: green; }
        .c { background-color: yellow; color:black; }
        .d { background-color: blue; }
        .e { background-color: purple; }
        .f { background-color: white; color:black; }
        .g { background-color: brown; }
        .h { background-color: black; }
        .i { background-color: gray; }
    </style>
</head>

<body>

<div class="container mt-4">
    <div class="row">
        <div class="col-xs-12 col-sm-6 col-md-3 col-lg-2 col-xl-10 item a">A</div>
        <div class="col-xs-12 col-sm-4 col-md-3 col-lg-2 col-xl-2 item b">B</div>
        <div class="col-xs-12 col-sm-2 col-md-3 col-lg-2 col-xl-3 item c">C</div>
        <div class="col-xs-12 col-sm-4 col-md-3 col-lg-2 col-xl-3 item d">D</div>
        <div class="col-xs-12 col-sm-4 col-md-6 col-lg-4 col-xl-3 item e">E</div>
        <div class="col-xs-12 col-sm-4 col-md-6 col-lg-4 col-xl-3 item f">F</div>
        <div class="col-xs-12 col-sm-10 col-md-6 col-lg-4 col-xl-2 item g">G</div>
        <div class="col-xs-12 col-sm-2 col-md-6 col-lg-4 col-xl-8 item h">H</div>
        <div class=" col-xl-2 item i">I</div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
